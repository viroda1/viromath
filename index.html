<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIRO GN-MATH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#0a001a;
  color:white;
  font-family:Inter, sans-serif;
  overflow:hidden;
}

#loading {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.spinner {
  margin-top:10px;
  width:30px;
  height:30px;
  border:3px solid #444;
  border-top:3px solid #a855f7;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

iframe {
  width:100%;
  height:100vh;
  border:none;
  display:none;
}
</style>
</head>

<body>

<div id="loading">
  <div>VIRO loading GN‑Math...</div>
  <div class="spinner"></div>
  <small id="status">Initializing</small>
</div>

<iframe id="app"></iframe>

<script>
const SOURCES = [
  "https://raw.githubusercontent.com/gn-math/gn-math-DONTDMCA/refs/heads/main/singlefile.html",
  "https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA/singlefile.html"
];

const statusText = document.getElementById("status");

async function tryLoad(url) {
  statusText.innerText = "Trying source...";
  
  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed fetch");

  const html = await res.text();

  const blob = new Blob([html], { type: "text/html" });
  return URL.createObjectURL(blob);
}

async function loadApp() {
  for (let i = 0; i < SOURCES.length; i++) {
    try {
      statusText.innerText = "Loading source " + (i+1);
      const url = await tryLoad(SOURCES[i]);

      const frame = document.getElementById("app");
      frame.src = url;

      frame.onload = () => {
        document.getElementById("loading").style.display = "none";
        frame.style.display = "block";
      };

      return;
    } catch (e) {
      console.warn("Source failed:", SOURCES[i]);
    }
  }

  statusText.innerText = "All sources failed 💀";
}

loadApp();
</script>

</body>
</html>
