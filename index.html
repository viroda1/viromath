<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRO OS</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a0033; color: white; }
        
        /* Boot Animation */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #4b0082 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; animation: fadeOut 1s forwards 3s;
        }
        .starburst { width: 100px; height: 100px; background: purple; border-radius: 50%; filter: blur(20px); animation: burst 1s ease-out; }
        #viro-logo { font-size: 4em; font-weight: bold; opacity: 0; animation: fadeIn 0.5s forwards 1s; }
        
        @keyframes burst { 0% { transform: scale(0.1); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeOut { to { visibility: hidden; opacity: 0; } }

        /* OS Environment */
        #os-desktop { display: none; height: 100vh; background-image: url('https://wallpaperaccess.com'); background-size: cover; }
        #desktop-content { padding: 50px; display: flex; flex-direction: column; align-items: center; }
        
        /* Viro Homepage Elements */
        #search-bar { width: 40%; padding: 15px; border-radius: 25px; border: none; margin-top: 20px; text-align: center; background: rgba(255,255,255,0.8); }
        
        /* Taskbar */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 10px; }
        .app-icon { width: 35px; height: 35px; margin: 0 10px; cursor: pointer; border-radius: 5px; }

        /* Login Modal */
        #login-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2d0059; padding: 30px; border-radius: 10px; border: 2px solid #8a2be2;
            z-index: 1001; text-align: center;
        }
    </style>
</head>
<body>

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="starburst"></div>
        <div id="viro-logo">VIRO</div>
    </div>

    <!-- OS Desktop -->
    <div id="os-desktop">
        <div id="desktop-content">
            <h1>VIRO</h1>
            <input type="text" id="search-bar" placeholder="Search Viro..." />
        </div>
        
        <div id="taskbar">
            <img src="https://flaticon.com" class="app-icon" title="Discord" onclick="openApp('discord')">
            <img src="https://rbxcdn.com" class="app-icon" title="Roblox" onclick="openApp('roblox')">
            <img src="https://flaticon.com" class="app-icon" title="Files" onclick="openApp('files')">
        </div>
    </div>

    <!-- Login -->
    <div id="login-modal">
        <h2>CREATE YOUR ACCOUNT!</h2>
        <input type="text" placeholder="Username" style="display:block; margin:10px auto;"><br>
        <button onclick="startOS()">Login / Sign Up</button>
    </div>

    <script>
        // Start Fullscreen
        function startOS() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('os-desktop').style.display = 'block';
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // App Emulator (Now.gg Unblocked)
        function openApp(app) {
            if(app === 'discord') window.open('https://now.gg', '_blank');
            if(app === 'roblox') window.open('https://now.gg', '_blank');
            if(app === 'files') alert("Opening Files... (We can use different files)");
        }
    </script>
</body>
</html>
