<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIRO GN-MATH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  overflow:hidden;
  background: linear-gradient(-45deg, #0a001a, #1a0033, #2a0066, #140033);
  background-size: 400% 400%;
  animation: gradientShift 10s ease infinite;
  color:white;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

#loading {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

#loading div {
  font-size:20px;
  font-weight:600;
  text-shadow:0 0 10px #a855f7;
}

.spinner {
  margin-top:15px;
  width:35px;
  height:35px;
  border:3px solid rgba(255,255,255,0.2);
  border-top:3px solid #a855f7;
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 15px #a855f7;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

small {
  display:block;
  margin-top:10px;
  opacity:0.7;
  text-shadow:0 0 8px #9333ea;
}

iframe {
  width:100%;
  height:100vh;
  border:none;
  display:none;
  background:black;
}
</style>

</head>
<body>

<div id="loading">
  <div>VIRO loading GN‑Math...</div>
  <div class="spinner"></div>
  <small id="status">Initializing</small>
</div>

<iframe id="app"></iframe>

<script>
const SOURCES = [
  "https://raw.githubusercontent.com/gn-math/gn-math-DONTDMCA/refs/heads/main/singlefile.html",
  "https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA/singlefile.html"
];

const statusText = document.getElementById("status");

async function tryLoad(url) {
  statusText.innerText = "Trying source...";
  
  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed fetch");

  const html = await res.text();

  const blob = new Blob([html], { type: "text/html" });
  return URL.createObjectURL(blob);
}

async function loadApp() {
  for (let i = 0; i < SOURCES.length; i++) {
    try {
      statusText.innerText = "Loading source " + (i+1);
      const url = await tryLoad(SOURCES[i]);

      const frame = document.getElementById("app");
      frame.src = url;

      frame.onload = () => {
        document.getElementById("loading").style.display = "none";
        frame.style.display = "block";
      };

      return;
    } catch (e) {
      console.warn("Source failed:", SOURCES[i]);
    }
  }

  statusText.innerText = "All sources failed 💀";
}

loadApp();
</script>

</body>
</html>
